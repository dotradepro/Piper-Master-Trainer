services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
      - /home/dotradepro/.config/google-chrome:/root/.config/google-chrome:ro
      - /home/dotradepro/.mozilla/firefox:/root/.mozilla/firefox:ro
    depends_on:
      - redis
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./storage/db.sqlite3
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=./storage
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    shm_size: '2gb'

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "80:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
